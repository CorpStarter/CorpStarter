api_platform:
    resource: .
    type: api_platform
    prefix: /api

# Admin Routes
admin_change_project_status:
    path: /admin/projects/{id}/status
    controller: App\Controller\AdminController::changeProjectStatus
    methods: [PATCH]
    requirements:
        id: '\d+'

admin_allocate_budget:
    path: /admin/projects/{id}/budget
    controller: App\Controller\AdminController::allocateBudget
    methods: [PATCH]
    requirements:
        id: '\d+'

# Auth Routes
auth_signup:
    path: /auth/signup
    controller: App\Controller\AuthController::signup
    methods: [POST]

auth_signin:
    path: /auth/signin
    controller: App\Controller\AuthController::signin
    methods: [POST]

auth_verify_email:
    path: /auth/verify-email
    controller: App\Controller\AuthController::verifyEmail
    methods: [POST]

# Project Routes
projects_list:
    path: /projects
    controller: App\Controller\ProjectController::list
    methods: [GET]

projects_create:
    path: /projects
    controller: App\Controller\ProjectController::create
    methods: [POST]

projects_edit:
    path: /projects/{id}
    controller: App\Controller\ProjectController::edit
    methods: [PUT, PATCH]
    requirements:
        id: '\d+'

projects_delete:
    path: /projects/{id}
    controller: App\Controller\ProjectController::delete
    methods: [DELETE]
    requirements:
        id: '\d+'

projects_join:
    path: /projects/{id}/join
    controller: App\Controller\ProjectController::join
    methods: [POST]
    requirements:
        id: '\d+'
