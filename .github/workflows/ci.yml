name: CI CorpStarter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- PARTIE BACKEND (SYMFONY) ---
  backend-tests:
    name: 🐘 Symfony Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/EasyAdmin # Symfony est ici !
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4.1'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql
          coverage: none

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Check Symfony Syntax (Lint)
        run: php bin/console lint:container
        env:
          APP_ENV: test

  # --- PARTIE FRONTEND (REACT) ---
  frontend-build:
    name: ⚛️ React Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Indispensable pour le Monorepo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build React App (Vite)
        run: npm run build

  # --- BASE DE DONNÉES (MIGRATIONS) ---
  database-migrations:
    name: 🗄️ Database Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/EasyAdmin
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: corpstarter_test
          MYSQL_PASSWORD: test
          MYSQL_USER: test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4.1'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --prefer-dist

      - name: Doctrine Migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: 'mysql://test:test@127.0.0.1:3306/corpstarter_test'