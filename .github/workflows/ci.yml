name: CI CorpStarter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- PARTIE BACKEND (SYMFONY) ---
  backend-tests:
    name: 🐘 Symfony Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Indispensable pour le Monorepo
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql
          coverage: none

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Check Symfony Syntax (Lint)
        run: php bin/console lint:container

  # --- PARTIE FRONTEND (REACT) ---
  frontend-build:
    name: ⚛️ React Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Indispensable pour le Monorepo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build React App (Vite)
        run: npm run build