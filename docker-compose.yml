services:
  database:
    image: mysql:lts
    platform: linux/amd64 
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: corpstarter
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
      - "8001:8080"
    depends_on:
      - database

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    # On maintient le conteneur en vie le temps d'installer React
    command: sh -c "npm run dev -- --host"

volumes:
  db_data: